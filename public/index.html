<script>/* aparência salva antes do 1º paint (evita flash claro↔escuro) */
try { var _ap = localStorage.getItem('bisa_appearance'); if (_ap) document.documentElement.dataset.appearance = _ap; } catch (e) {}</script>

<div id="gate">

       sem esse JS ou em navegador antigo: input de código simples. -->
  <div id="gate-fallback">
    <div style="font-size:2rem">🌿</div>
    <h1 style="margin:0">bisa</h1>
    <p class="muted">Cole o link com seu código de acesso para entrar.</p>
    <input id="gate-token" placeholder="código de acesso" autocomplete="off" style="max-width:320px">
    <button class="btn" id="gate-go">Entrar</button>
  </div>
</div>
